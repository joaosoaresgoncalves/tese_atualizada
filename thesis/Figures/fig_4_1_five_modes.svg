<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="430" viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <title>Five-mode ablation pipeline diagram</title>
  <desc>Five rows, one per ablation mode A through E, each showing the pipeline stages from parse to disposition. The deterministic stage (amber) appears in different positions: absent in A, after the LLM in B, called mid-LLM as tools in D, and before the LLM in E. Mode C uses an LLM-as-judge (teal) instead of a deterministic stage.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>

  <style>
    .label   { font-size: 13px; font-weight: 600; fill: #222; }
    .sub     { font-size: 11px; fill: #555; }
    .box     { font-size: 12px; fill: #222; text-anchor: middle; dominant-baseline: middle; }
    .arrow   { stroke: #444; stroke-width: 1.4; fill: none; }
    .dashed  { stroke-dasharray: 4 3; }
    .blue    { fill: #d6e6f7; stroke: #4a86c5; }
    .amber   { fill: #fbe4c2; stroke: #d08a3a; }
    .teal    { fill: #cfeae3; stroke: #4ea893; }
    .grey    { fill: #ececec; stroke: #888; }
  </style>

  <text x="20" y="26" class="label">Five-mode ablation: where the deterministic stage sits</text>

  <!-- Row A: pure LLM -->
  <text x="20" y="76" class="label">A</text>
  <text x="20" y="92" class="sub">pure LLM</text>
  <rect class="grey"  x="100" y="62" width="80"  height="36" rx="4"/>
  <text class="box"   x="140" y="80">Parse</text>
  <line class="arrow" x1="184" y1="80" x2="220" y2="80" marker-end="url(#arr)"/>
  <rect class="blue"  x="224" y="62" width="170" height="36" rx="4"/>
  <text class="box"   x="309" y="80">LLM (rule evaluation)</text>
  <line class="arrow dashed" x1="398" y1="80" x2="514" y2="80" marker-end="url(#arr)"/>
  <rect class="grey"  x="518" y="62" width="130" height="36" rx="4"/>
  <text class="box"   x="583" y="80">Disposition</text>

  <!-- Row B: post-hoc deterministic -->
  <text x="20" y="146" class="label">B</text>
  <text x="20" y="162" class="sub">post-hoc enforcer</text>
  <rect class="grey"  x="100" y="132" width="80"  height="36" rx="4"/>
  <text class="box"   x="140" y="150">Parse</text>
  <line class="arrow" x1="184" y1="150" x2="220" y2="150" marker-end="url(#arr)"/>
  <rect class="blue"  x="224" y="132" width="120" height="36" rx="4"/>
  <text class="box"   x="284" y="150">LLM</text>
  <line class="arrow" x1="348" y1="150" x2="378" y2="150" marker-end="url(#arr)"/>
  <rect class="amber" x="382" y="132" width="120" height="36" rx="4"/>
  <text class="box"   x="442" y="150">Deterministic</text>
  <line class="arrow" x1="506" y1="150" x2="514" y2="150" marker-end="url(#arr)"/>
  <rect class="grey"  x="518" y="132" width="130" height="36" rx="4"/>
  <text class="box"   x="583" y="150">Disposition</text>

  <!-- Row C: LLM-as-judge -->
  <text x="20" y="216" class="label">C</text>
  <text x="20" y="232" class="sub">LLM-as-judge</text>
  <rect class="grey"  x="100" y="202" width="80"  height="36" rx="4"/>
  <text class="box"   x="140" y="220">Parse</text>
  <line class="arrow" x1="184" y1="220" x2="220" y2="220" marker-end="url(#arr)"/>
  <rect class="blue"  x="224" y="202" width="120" height="36" rx="4"/>
  <text class="box"   x="284" y="220">LLM</text>
  <line class="arrow" x1="348" y1="220" x2="378" y2="220" marker-end="url(#arr)"/>
  <rect class="teal"  x="382" y="202" width="120" height="36" rx="4"/>
  <text class="box"   x="442" y="220">LLM judge</text>
  <line class="arrow" x1="506" y1="220" x2="514" y2="220" marker-end="url(#arr)"/>
  <rect class="grey"  x="518" y="202" width="130" height="36" rx="4"/>
  <text class="box"   x="583" y="220">Disposition</text>

  <!-- Row D: in-generation tool use -->
  <text x="20" y="286" class="label">D</text>
  <text x="20" y="302" class="sub">in-generation tool use</text>
  <rect class="grey"  x="100" y="272" width="80"  height="36" rx="4"/>
  <text class="box"   x="140" y="290">Parse</text>
  <line class="arrow" x1="184" y1="290" x2="220" y2="290" marker-end="url(#arr)"/>
  <rect class="blue"  x="224" y="272" width="270" height="36" rx="4"/>
  <text class="box"   x="359" y="290">LLM</text>
  <rect class="amber" x="304" y="244" width="160" height="22" rx="4"/>
  <text class="box"   x="384" y="258" font-size="11">Deterministic tools</text>
  <path class="arrow" d="M340 266 L340 272" marker-end="url(#arr)"/>
  <path class="arrow" d="M428 272 L428 266" marker-end="url(#arr)"/>
  <line class="arrow" x1="498" y1="290" x2="514" y2="290" marker-end="url(#arr)"/>
  <rect class="grey"  x="518" y="272" width="130" height="36" rx="4"/>
  <text class="box"   x="583" y="290">Disposition</text>

  <!-- Row E: pre-hoc partition -->
  <text x="20" y="356" class="label">E</text>
  <text x="20" y="372" class="sub">pre-hoc partition</text>
  <rect class="grey"  x="100" y="342" width="80"  height="36" rx="4"/>
  <text class="box"   x="140" y="360">Parse</text>
  <line class="arrow" x1="184" y1="360" x2="220" y2="360" marker-end="url(#arr)"/>
  <rect class="amber" x="224" y="342" width="120" height="36" rx="4"/>
  <text class="box"   x="284" y="360">Deterministic</text>
  <line class="arrow" x1="348" y1="360" x2="378" y2="360" marker-end="url(#arr)"/>
  <rect class="blue"  x="382" y="342" width="120" height="36" rx="4"/>
  <text class="box"   x="442" y="360">LLM</text>
  <line class="arrow" x1="506" y1="360" x2="514" y2="360" marker-end="url(#arr)"/>
  <rect class="grey"  x="518" y="342" width="130" height="36" rx="4"/>
  <text class="box"   x="583" y="360">Disposition</text>

  <!-- Legend -->
  <rect class="blue"  x="100" y="402" width="14" height="14" rx="2"/>
  <text class="sub"   x="120" y="413">LLM</text>
  <rect class="amber" x="180" y="402" width="14" height="14" rx="2"/>
  <text class="sub"   x="200" y="413">deterministic stage</text>
  <rect class="teal"  x="320" y="402" width="14" height="14" rx="2"/>
  <text class="sub"   x="340" y="413">LLM-as-judge</text>
  <rect class="grey"  x="430" y="402" width="14" height="14" rx="2"/>
  <text class="sub"   x="450" y="413">parse / disposition</text>
</svg>
